<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAY TRIP PRO ✈️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>

/* ===================== RESET & BASE ===================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sky:       #0ea5e9;
  --sky-dark:  #0369a1;
  --sand:      #f59e0b;
  --sand-dark: #b45309;
  --night:     #0f172a;
  --night2:    #1e293b;
  --night3:    #334155;
  --cloud:     #f0f9ff;
  --white:     #ffffff;
  --text:      #1e293b;
  --text-soft: #64748b;
  --danger:    #ef4444;
  --success:   #22c55e;
  --radius:    14px;
  --shadow:    0 4px 24px rgba(14,165,233,.13);
}

body {
  font-family: 'Cairo', tahoma, sans-serif;
  background: var(--night);
  color: var(--white);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===================== SKY BACKGROUND ===================== */
.sky-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  background: linear-gradient(180deg, #0a1628 0%, #0f2447 40%, #1a3a6b 70%, #0f172a 100%);
  overflow: hidden;
}

/* Stars */
.stars {
  position: absolute;
  inset: 0;
}
.star {
  position: absolute;
  background: #fff;
  border-radius: 50%;
  animation: twinkle var(--d, 3s) ease-in-out infinite alternate;
}
@keyframes twinkle {
  from { opacity: .2; transform: scale(.8); }
  to   { opacity: 1;  transform: scale(1.2); }
}

/* Clouds */
.cloud-layer {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 260px;
  background: linear-gradient(to top, #0f172a 0%, transparent 100%);
}
.cloud {
  position: absolute;
  background: rgba(255,255,255,.04);
  border-radius: 50px;
  animation: drift var(--spd, 60s) linear infinite;
}
@keyframes drift {
  from { transform: translateX(110vw); }
  to   { transform: translateX(-110vw); }
}

/* Plane */
.plane-container {
  position: absolute;
  top: 18%;
  left: -120px;
  animation: fly 18s linear infinite;
  z-index: 1;
}
@keyframes fly {
  0%   { left: -120px; top: 22%; }
  50%  { top: 14%; }
  100% { left: calc(100vw + 120px); top: 22%; }
}
.plane-svg { width: 90px; filter: drop-shadow(0 0 14px rgba(14,165,233,.6)); }

/* Trail */
.trail {
  position: absolute;
  top: 50%;
  right: 90px;
  width: 200px;
  height: 2px;
  background: linear-gradient(to right, transparent, rgba(255,255,255,.3));
  transform: translateY(-1px);
}

/* ===================== LAYOUT ===================== */
.app {
  position: relative;
  z-index: 10;
  max-width: 520px;
  margin: 0 auto;
  padding: 0 0 100px;
}

/* ===================== HEADER ===================== */
header {
  text-align: center;
  padding: 40px 20px 24px;
}
.logo-badge {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(14,165,233,.15);
  border: 1px solid rgba(14,165,233,.3);
  border-radius: 50px;
  padding: 6px 20px;
  font-size: .78rem;
  letter-spacing: .12em;
  color: var(--sky);
  text-transform: uppercase;
  margin-bottom: 12px;
}
header h1 {
  font-size: 2rem;
  font-weight: 900;
  background: linear-gradient(135deg, #fff 0%, var(--sky) 60%, var(--sand) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: .02em;
  line-height: 1.1;
}
header p {
  color: rgba(255,255,255,.45);
  font-size: .85rem;
  margin-top: 6px;
}

/* ===================== SUMMARY BAR ===================== */
.summary-bar {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 0 16px 20px;
}
.sum-card {
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: var(--radius);
  padding: 12px 8px;
  text-align: center;
}
.sum-card .val {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--sky);
}
.sum-card .lbl {
  font-size: .7rem;
  color: rgba(255,255,255,.4);
  margin-top: 2px;
}

/* ===================== NAV ===================== */
nav {
  display: flex;
  gap: 6px;
  padding: 0 16px 16px;
  position: sticky;
  top: 0;
  z-index: 50;
  background: linear-gradient(to bottom, #0f172a 80%, transparent);
  padding-top: 10px;
}
nav button {
  flex: 1;
  padding: 9px 4px;
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 10px;
  background: rgba(255,255,255,.04);
  color: rgba(255,255,255,.5);
  font-family: 'Cairo', sans-serif;
  font-size: .78rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
nav button span.icon { font-size: 1.1rem; }
nav button:hover {
  background: rgba(14,165,233,.12);
  color: var(--sky);
  border-color: rgba(14,165,233,.3);
}
nav button.active {
  background: linear-gradient(135deg, var(--sky-dark), var(--sky));
  color: #fff;
  border-color: var(--sky);
  box-shadow: 0 4px 16px rgba(14,165,233,.3);
}

/* ===================== SECTIONS ===================== */
.section { display: none; padding: 0 16px; animation: fadeUp .3s ease; }
.section.active { display: block; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ===================== FORM CARD ===================== */
.form-card {
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.09);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 14px;
}
.form-card h3 {
  font-size: .95rem;
  font-weight: 700;
  color: var(--sky);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.fields {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.fields .full { grid-column: 1 / -1; }

input {
  width: 100%;
  padding: 10px 12px;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 9px;
  color: #fff;
  font-family: 'Cairo', sans-serif;
  font-size: .85rem;
  outline: none;
  transition: border-color .2s, background .2s;
}
input::placeholder { color: rgba(255,255,255,.3); }
input:focus {
  border-color: var(--sky);
  background: rgba(14,165,233,.08);
}

.btn-add {
  width: 100%;
  margin-top: 10px;
  padding: 11px;
  background: linear-gradient(135deg, var(--sky-dark), var(--sky));
  color: #fff;
  border: none;
  border-radius: 9px;
  font-family: 'Cairo', sans-serif;
  font-size: .9rem;
  font-weight: 700;
  cursor: pointer;
  transition: opacity .2s, transform .1s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.btn-add:hover  { opacity: .9; }
.btn-add:active { transform: scale(.98); }

/* ===================== LIST ITEMS ===================== */
.list-title {
  font-size: .78rem;
  font-weight: 700;
  color: rgba(255,255,255,.3);
  letter-spacing: .1em;
  text-transform: uppercase;
  padding: 4px 0 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.list-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(255,255,255,.07);
}

.item {
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.07);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: border-color .2s;
  position: relative;
  overflow: hidden;
}
.item::before {
  content: '';
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--sky);
  border-radius: 0 var(--radius) var(--radius) 0;
}
.item.done::before { background: var(--success); }
.item.done { opacity: .6; }
.item.done .item-name { text-decoration: line-through; }

.item-icon {
  width: 36px;
  height: 36px;
  border-radius: 9px;
  background: rgba(14,165,233,.1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
}

.item-body { flex: 1; min-width: 0; }
.item-name {
  font-size: .88rem;
  font-weight: 700;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.item-meta {
  font-size: .74rem;
  color: rgba(255,255,255,.4);
  margin-top: 2px;
}

.item-price {
  font-size: .9rem;
  font-weight: 700;
  color: var(--sand);
  white-space: nowrap;
}

.item-actions {
  display: flex;
  gap: 5px;
  flex-shrink: 0;
}
.btn-icon {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,.1);
  background: rgba(255,255,255,.05);
  color: rgba(255,255,255,.5);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .85rem;
  transition: all .15s;
}
.btn-icon:hover { background: rgba(255,255,255,.12); color: #fff; }
.btn-icon.done-btn:hover { background: rgba(34,197,94,.15); color: var(--success); border-color: var(--success); }
.btn-icon.del-btn:hover  { background: rgba(239,68,68,.15);  color: var(--danger);  border-color: var(--danger);  }

/* ===================== MEMBER CARD ===================== */
.member-item {
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.07);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 8px;
}
.member-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.member-name { font-weight: 700; font-size: .95rem; }
.member-del {
  width: 28px; height: 28px;
  border-radius: 7px;
  border: 1px solid rgba(239,68,68,.3);
  background: rgba(239,68,68,.07);
  color: var(--danger);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: .8rem;
  transition: all .15s;
}
.member-del:hover { background: rgba(239,68,68,.2); }

.progress-row {
  display: flex;
  justify-content: space-between;
  font-size: .75rem;
  color: rgba(255,255,255,.4);
  margin-bottom: 6px;
}
.progress-bar {
  height: 6px;
  background: rgba(255,255,255,.08);
  border-radius: 99px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 99px;
  background: linear-gradient(to left, var(--success), var(--sky));
  transition: width .4s ease;
}

/* ===================== EXPENSE TOTAL ===================== */
.total-row {
  background: rgba(245,158,11,.08);
  border: 1px solid rgba(245,158,11,.2);
  border-radius: var(--radius);
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.total-row .lbl { font-size: .8rem; color: rgba(255,255,255,.5); }
.total-row .val { font-size: 1.1rem; font-weight: 800; color: var(--sand); }

/* ===================== EMPTY STATE ===================== */
.empty {
  text-align: center;
  padding: 32px 16px;
  color: rgba(255,255,255,.2);
  font-size: .85rem;
}
.empty .big { font-size: 2rem; margin-bottom: 6px; }

/* ===================== TOAST ===================== */
.toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--night2);
  border: 1px solid rgba(14,165,233,.3);
  border-radius: 99px;
  padding: 9px 20px;
  font-size: .82rem;
  color: var(--sky);
  opacity: 0;
  transition: all .3s;
  white-space: nowrap;
  z-index: 999;
  pointer-events: none;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

</style>
</head>
<body>

<!-- ========== SKY BACKGROUND ========== -->
<div class="sky-bg">
  <div class="stars" id="stars"></div>

  <!-- Plane -->
  <div class="plane-container">
    <div class="trail"></div>
    <svg class="plane-svg" viewBox="0 0 100 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M95 28L10 5L22 28L10 51L95 28Z" fill="white" fill-opacity="0.95"/>
      <path d="M22 28L35 20L50 28L35 36Z" fill="#0ea5e9" fill-opacity="0.4"/>
      <path d="M35 20L55 10L60 28L55 46L35 36" fill="#0ea5e9" fill-opacity="0.15"/>
    </svg>
  </div>

  <!-- Clouds -->
  <div id="clouds"></div>
  <div class="cloud-layer"></div>
</div>

<!-- ========== APP ========== -->
<div class="app">

  <!-- HEADER -->
  <header>
    <div class="logo-badge">✈</div>
    <h1>AAY Group</h1>
    <p> كل تفاصيل رحلتك بأسلوب احترافي</p>
  </header>

  <!-- SUMMARY -->
  <div class="summary-bar" id="summaryBar">
    <div class="sum-card"><div class="val" id="sumMembers">0</div><div class="lbl">أعضاء</div></div>
    <div class="sum-card"><div class="val" id="sumEvents">0</div><div class="lbl">فعالية</div></div>
    <div class="sum-card"><div class="val" id="sumTotal">0</div><div class="lbl">ر.س إجمالي</div></div>
  </div>

  <!-- NAV -->
  <nav>
    <button class="active" onclick="openTab('members',this)">
      <span class="icon">👥</span>الأعضاء
    </button>
    <button onclick="openTab('events',this)">
      <span class="icon">🎉</span>الفعاليات
    </button>
    <button onclick="openTab('restaurants',this)">
      <span class="icon">🍽️</span>المطاعم
    </button>
    <button onclick="openTab('expenses',this)">
      <span class="icon">💰</span>المصروفات
    </button>
  </nav>

  <!-- ======= MEMBERS ======= -->
  <div id="members" class="section active">
    <div class="form-card">
      <h3><span>👤</span> إضافة عضو</h3>
      <div class="fields">
        <input class="full" id="mName" placeholder="اسم العضو">
        <input id="mDue"  type="number" placeholder="المطلوب (ر.س)">
        <input id="mPaid" type="number" placeholder="المدفوع (ر.س)">
      </div>
      <button class="btn-add" onclick="addMember()">
        <span>+</span> إضافة عضو
      </button>
    </div>
    <div class="list-title">القائمة</div>
    <div id="membersList"></div>
  </div>

  <!-- ======= EVENTS ======= -->
  <div id="events" class="section">
    <div class="form-card">
      <h3><span>🎯</span> إضافة فعالية</h3>
      <div class="fields">
        <input class="full" id="eTitle" placeholder="اسم الفعالية">
        <input id="eDate"  placeholder="التاريخ">
        <input id="ePrice" type="number" placeholder="السعر (ر.س)">
      </div>
      <button class="btn-add" onclick="addEvent()">
        <span>+</span> إضافة فعالية
      </button>
    </div>
    <div class="list-title">الفعاليات</div>
    <div id="eventsList"></div>
  </div>

  <!-- ======= RESTAURANTS ======= -->
  <div id="restaurants" class="section">
    <div class="form-card">
      <h3><span>🍴</span> إضافة مطعم</h3>
      <div class="fields">
        <input class="full" id="rName" placeholder="اسم المطعم">
        <input id="rDate"  placeholder="التاريخ">
        <input id="rPrice" type="number" placeholder="السعر (ر.س)">
      </div>
      <button class="btn-add" onclick="addRestaurant()">
        <span>+</span> إضافة مطعم
      </button>
    </div>
    <div class="list-title">المطاعم</div>
    <div id="restaurantsList"></div>
  </div>

  <!-- ======= EXPENSES ======= -->
  <div id="expenses" class="section">
    <div class="form-card">
      <h3><span>🧾</span> إضافة مصروف</h3>
      <div class="fields">
        <input class="full" id="xName"   placeholder="البند">
        <input id="xDate"   placeholder="التاريخ">
        <input id="xAmount" type="number" placeholder="المبلغ (ر.س)">
      </div>
      <button class="btn-add" onclick="addExpense()">
        <span>+</span> إضافة مصروف
      </button>
    </div>
    <div class="list-title">المصروفات</div>
    <div class="total-row" id="expenseTotal" style="display:none">
      <span class="lbl">💰 الإجمالي</span>
      <span class="val" id="totalExpenses">0 ر.س</span>
    </div>
    <div id="expensesList"></div>
  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>

/* ===== BACKGROUND EFFECTS ===== */
(function() {
  // Stars
  const stars = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + .5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*80}%;
      right:${Math.random()*100}%;
      --d:${2+Math.random()*4}s;
      animation-delay:${Math.random()*3}s;
    `;
    stars.appendChild(s);
  }
  // Clouds
  const cloudWrap = document.getElementById('clouds');
  const cloudSizes = [[180,40],[260,55],[140,35],[320,65],[200,45]];
  cloudSizes.forEach(([ w, h], i) => {
    const c = document.createElement('div');
    c.className = 'cloud';
    c.style.cssText = `
      width:${w}px; height:${h}px;
      bottom:${80+Math.random()*120}px;
      --spd:${50+Math.random()*60}s;
      animation-delay:-${Math.random()*60}s;
      opacity:${.04+Math.random()*.06};
    `;
    cloudWrap.appendChild(c);
  });
})();

/* ===== TAB ===== */
function openTab(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

/* ===== TOAST ===== */
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

/* ===== CLEAR ===== */
function clearInputs(...ids) { ids.forEach(id => document.getElementById(id).value = ''); }

/* ===== LOAD ALL ===== */
window.onload = () => loadAll();
async function loadAll() {
  await Promise.all([loadMembers(), loadEvents(), loadRestaurants(), loadExpenses()]);
}

/* ===== MEMBERS ===== */
async function loadMembers() {
  const data = await fetch('/members').then(r => r.json());
  document.getElementById('sumMembers').textContent = data.length;

  const el = document.getElementById('membersList');
  if (!data.length) { el.innerHTML = `<div class="empty"><div class="big">👥</div>لا يوجد أعضاء بعد</div>`; return; }

  el.innerHTML = data.map(m => {
    const pct = m.due ? Math.min(100, Math.round((m.paid / m.due) * 100)) : 0;
    const color = pct >= 100 ? '#22c55e' : pct >= 50 ? '#0ea5e9' : '#f59e0b';
    return `
    <div class="member-item">
      <div class="member-top">
        <span class="member-name">👤 ${m.name}</span>
        <button class="member-del" onclick="deleteMember('${m._id}')">✕</button>
      </div>
      <div class="progress-row">
        <span>مدفوع: <b style="color:#fff">${m.paid} ر.س</b></span>
        <span>المطلوب: <b style="color:#fff">${m.due} ر.س</b></span>
        <span style="color:${color};font-weight:700">${pct}%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${pct}%;background:linear-gradient(to left,${color},${color}88)"></div>
      </div>
    </div>`;
  }).join('');
}

async function addMember() {
  const name = mName.value.trim();
  if (!name) return;
  await fetch('/members', { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ name, due: +mDue.value||0, paid: +mPaid.value||0 }) });
  clearInputs('mName','mDue','mPaid');
  toast('✅ تمت إضافة العضو');
  loadMembers(); updateSummary();
}

async function deleteMember(id) {
  await fetch('/members/'+id, { method:'DELETE' });
  toast('🗑️ تم الحذف');
  loadMembers(); updateSummary();
}

/* ===== EVENTS ===== */
async function loadEvents() {
  const data = await fetch('/events').then(r => r.json());
  document.getElementById('sumEvents').textContent = data.length;
  const el = document.getElementById('eventsList');
  if (!data.length) { el.innerHTML = `<div class="empty"><div class="big">🎉</div>لا توجد فعاليات بعد</div>`; return; }
  el.innerHTML = data.map(e => `
    <div class="item ${e.done?'done':''}">
      <div class="item-icon">🎯</div>
      <div class="item-body">
        <div class="item-name">${e.title}</div>
        <div class="item-meta">📅 ${e.date||'—'}</div>
      </div>
      <span class="item-price">${e.price} ر.س</span>
      <div class="item-actions">
        <button class="btn-icon done-btn" onclick="toggleEvent('${e._id}')" title="${e.done?'إلغاء':'تأكيد'}">${e.done?'↩':'✔'}</button>

    </div>`).join('');
}

  el.innerHTML = data.map(r => `

      <div class="item-icon">🍜</div>
      <div class="item-body">
        <div class="item-name">${r.name}</div>
        <div class="item-meta">📅 ${r.date||'—'}</div>

      <div class="item-actions">

        <button class="btn-icon del-btn"  onclick="deleteR('${r._id}')" title="حذف">✕</button>

}

  await fetch('/restaurants', { method:'POST', headers:{'Content-Type':'application/json'},

async function toggleR(id) {

/* ===== EXPENSES ===== */
async function loadExpenses() {
  const data = await fetch('/expenses').then(r => r.json());
  const el = document.getElementById('expensesList');
  const totalEl = document.getElementById('totalExpenses');
  const totalRow = document.getElementById('expenseTotal');

  if (!data.length) {
    el.innerHTML = `<div class="empty"><div class="big">💸</div>لا توجد مصروفات بعد</div>`;
    totalRow.style.display = 'none';
    return;
  }

  const total = data.reduce((s, x) => s + (x.amount||0), 0);
  totalEl.textContent = total.toLocaleString('ar-SA') + ' ر.س';
  totalRow.style.display = 'flex';
  document.getElementById('sumTotal').textContent = total.toLocaleString('ar-SA');

  el.innerHTML = data.map(x => `
    <div class="item">
      <div class="item-icon">🧾</div>
      <div class="item-body">
        <div class="item-name">${x.name}</div>
        <div class="item-meta">📅 ${x.date||'—'}</div>
      </div>
      <span class="item-price">${x.amount} ر.س</span>
      <div class="item-actions">
        <button class="btn-icon del-btn" onclick="deleteExpense('${x._id}')" title="حذف">✕</button>
      </div>
    </div>`).join('');
}

async function addExpense() {
  const name = xName.value.trim();
  if (!name) return;
  await fetch('/expenses', { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ name, date: xDate.value, amount: +xAmount.value||0 }) });
  clearInputs('xName','xDate','xAmount');
  toast('✅ تمت إضافة المصروف');
  loadExpenses(); updateSummary();
}

async function deleteExpense(id) {
  await fetch('/expenses/'+id, { method:'DELETE' });
  toast('🗑️ تم الحذف');
  loadExpenses();
}
