<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TripNest</title>

<link href="https://unpkg.com/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">

<style>
:root{
  --primary:#2F80ED;
  --green:#27AE60;
  --amber:#F2C94C;
  --red:#EB5757;
  --bg:#F9FAFB;
  --card:#FFFFFF;
  --text:#1F2937;
  --muted:#6B7280;
  --border:#E5E7EB;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

header{
  background:white;
  padding:15px 20px;
  border-bottom:1px solid var(--border);
  font-weight:600;
  font-size:18px;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  padding:16px;
  border-radius:12px;
  border:1px solid var(--border);
  margin-bottom:15px;
}

input,select{
  width:100%;
  padding:8px;
  margin-top:5px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid var(--border);
}

button{
  background:var(--primary);
  color:white;
  border:none;
  padding:8px 15px;
  border-radius:8px;
  cursor:pointer;
}

button.danger{
  background:var(--red);
}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
}

.stat{
  background:white;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  font-size:14px;
}

.badge{
  font-size:11px;
  padding:3px 7px;
  border-radius:20px;
  background:var(--amber);
  color:black;
}
</style>
</head>

<body>

<header>✈️ TripNest - تخطيط الرحلات</header>

<div class="container">

<div class="card">
<h3>بيانات الرحلة</h3>
<input id="tripName" placeholder="اسم الرحلة">
<input id="tripDestination" placeholder="الوجهة">
<input id="tripBudget" type="number" placeholder="الميزانية">
<button onclick="saveTrip()">حفظ</button>
</div>

<div class="card">
<h3>إضافة عضو</h3>
<input id="memberName" placeholder="اسم العضو">
<input id="memberContribution" type="number" placeholder="المبلغ المطلوب">
<input id="memberPaid" type="number" placeholder="المدفوع">
<button onclick="addMember()">إضافة عضو</button>
</div>

<div id="membersList"></div>

<div class="card">
<h3>إضافة مصروف</h3>
<input id="expenseTitle" placeholder="اسم المصروف">
<input id="expenseAmount" type="number" placeholder="المبلغ">
<button onclick="addExpense()">إضافة مصروف</button>
</div>

<div id="expensesList"></div>

<div class="card">
<h3>إضافة نشاط</h3>
<input id="activityName" placeholder="اسم النشاط">
<input id="activityCost" type="number" placeholder="تكلفة النشاط">
<button onclick="addActivity()">إضافة نشاط</button>
</div>

<div id="activitiesList"></div>

<div class="card">
<h3>الإحصائيات</h3>
<div class="stats">
<div class="stat">الميزانية: <span id="statBudget">0</span></div>
<div class="stat">إجمالي المصروفات: <span id="statExpenses">0</span></div>
<div class="stat">إجمالي الأنشطة: <span id="statActivities">0</span></div>
<div class="stat">نصيب الفرد: <span id="statPerPerson">0</span></div>
</div>
</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("tripData")) || {
  trip:{name:"",destination:"",budget:0},
  members:[],
  expenses:[],
  activities:[]
};

function save(){
  localStorage.setItem("tripData",JSON.stringify(data));
  render();
}

function saveTrip(){
  data.trip.name = document.getElementById("tripName").value;
  data.trip.destination = document.getElementById("tripDestination").value;
  data.trip.budget = Number(document.getElementById("tripBudget").value);
  save();
}

function addMember(){
  data.members.push({
    id:Date.now(),
    name:memberName.value,
    contribution:Number(memberContribution.value),
    paid:Number(memberPaid.value)
  });
  save();
}

function addExpense(){
  data.expenses.push({
    id:Date.now(),
    title:expenseTitle.value,
    amount:Number(expenseAmount.value)
  });
  save();
}

function addActivity(){
  data.activities.push({
    id:Date.now(),
    name:activityName.value,
    cost:Number(activityCost.value)
  });
  save();
}

function removeMember(id){
  data.members = data.members.filter(m=>m.id!==id);
  save();
}

function removeExpense(id){
  data.expenses = data.expenses.filter(e=>e.id!==id);
  save();
}

function removeActivity(id){
  data.activities = data.activities.filter(a=>a.id!==id);
  save();
}

function render(){

  document.getElementById("membersList").innerHTML =
    data.members.map(m=>`
    <div class="card">
      <b>${m.name}</b>
      <div>المطلوب: ${m.contribution}</div>
      <div>المدفوع: ${m.paid}</div>
      <button class="danger" onclick="removeMember(${m.id})">حذف</button>
    </div>
    `).join("");

  document.getElementById("expensesList").innerHTML =
    data.expenses.map(e=>`
    <div class="card">
      <b>${e.title}</b>
      <div>${e.amount}</div>
      <button class="danger" onclick="removeExpense(${e.id})">حذف</button>
    </div>
    `).join("");

  document.getElementById("activitiesList").innerHTML =
    data.activities.map(a=>`
    <div class="card">
      <b>${a.name}</b>
      <div>${a.cost}</div>
      <button class="danger" onclick="removeActivity(${a.id})">حذف</button>
    </div>
    `).join("");

  const totalExpenses = data.expenses.reduce((s,e)=>s+e.amount,0);
  const totalActivities = data.activities.reduce((s,a)=>s+a.cost,0);
  const perPerson = data.members.length>0 ?
    (totalExpenses+totalActivities)/data.members.length : 0;

  statBudget.innerText = data.trip.budget;
  statExpenses.innerText = totalExpenses;
  statActivities.innerText = totalActivities;
  statPerPerson.innerText = perPerson.toFixed(2);
}

render();

</script>

</body>
</html>
